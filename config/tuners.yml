# SMB400 tuner — single physical tuner supports GR / BS / BS4K.
# smb400-tuner.sh derives IF frequency and mode from the channel value alone.
# No commandVars needed: GR=integer 13-62, BS=BSxx_y, BS4K=integer ≥40000.
- name: SMB400
  types:
    # - GR
    - BS      # 従来2K BS (ISDB-S, MULTI2) — smb400-tuner.sh descrambles via b21dec
    - BS4K
  command: /data/local/tmp/smb400-tuner.sh <channel>
  # No tlvDecoder / decoder: both BS (2K) and BS4K descrambling happen inside
  # smb400-tuner.sh, so the command emits already-descrambled MPEG-TS (BS) or TLV
  # (BS4K). BS uses Mirakurun's standard TSFilter; BS4K uses the TLVFilter. A
  # downstream decoder would be starved of scrambled data, so none is configured.
  tlvDecoder: null
  isDisabled: false
