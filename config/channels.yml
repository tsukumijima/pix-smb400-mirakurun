# --- BS8K (ISDB-S3, 衛星8K, 左旋) ---
# NHK BS8K。種別は BS4K に混在（同じ ISDB-S3 経路）。channel は実 tlvStreamId=45280
# （左旋。右旋IFでは受からず以前 "signal absent" として除外されていた値）。
# Mirakurun は channel を filterTlvStreamId として SDT を選別するため実 tlvStreamId 必須。
# smb400-tuner.sh が 45280 を IF 2472MHz にマップする。
- name: 'BS8K NHK'
  type: BS4K
  channel: '45280'
  serviceId: 102

# --- BS (ISDB-S, 従来2K衛星, 右旋) ---
# MULTI2 スクランブルを smb400-tuner.sh 内の b21dec が ACAS チップ経由で解除し、
# 平文 MPEG-TS を出力（Mirakurun 標準 TSFilter で処理）。
# channel=BSxx_y（xx=トランスポンダ番号, _y=相対TS）。IF は xx から、実 TS-ID は
# smb400-tuner.sh の TS-ID 表（実機 NIT 由来）で解決して tunertest に渡す。
#
# 一覧は実機 NIT/SDT スキャン（2026-06-21, 右旋 BS01〜BS23）で全相対 TS を確認した結果。
# 各局の ECM を ACAS チップへ投げて復号可否(rc)も確認済み:
#   * BS07/11/17 は BS4K(ISDB-S3/TLV) 専用のため 2K では受からない。
#   * 無料局(rc=0x0800)は本機で復号可。有料局(rc=0xa103)は本機未契約のため復号不可
#     （契約のある ACAS チップなら b21dec で復号できる。参考として末尾にコメントで残置）。

