# SMB400 channel list — BS4K only
# smb400-tuner.sh derives IF frequency from stream ID (integer ≥40000).
# Channels 45280 and 45745 removed — signal absent on this device.
#
# serviceId: BS4K はサービススキャン対象外のため、サービス登録には serviceId の
#            明示が必須。channel はチューナへ渡すストリームID、serviceId は SDT 上の
#            実サービスID（別物。実機の SDT から確認した値）。

# --- BS4K (ISDB-S3, 衛星4K) ---
- name: 'BS4K 45168'
